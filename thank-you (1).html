<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - CLM-Market</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Wistia -->
<script src="https://fast.wistia.com/player.js" async></script>
<script src="https://fast.wistia.com/embed/9y97ovrv0l.js" async type="module"></script>
<style>
  wistia-player[media-id='9y97ovrv0l']:not(:defined){
    background:center/contain no-repeat url('https://fast.wistia.com/embed/medias/9y97ovrv0l/swatch');
    display:block;filter:blur(5px);padding-top:56.25%;
  }
</style>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden}

/* ── PARTICLES ── */
#particles-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* ── PAGE ── */
.page{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:48px 20px 0;
  background:#000;
}

/* ── STARS ── */
.star-canvas{
  position:absolute;
  top:14%;
  pointer-events:none;
  z-index:2;
  width:280px;height:280px;
  max-width:26vw;
}
#star-left {left:16px}
#star-right{right:16px}

/* ── WAVES ── */
#wave-canvas{
  position:absolute;
  bottom:0;left:0;
  width:100%;height:360px;
  pointer-events:none;
  z-index:1;
}

/* ── CONTENT ── */
.content{
  position:relative;
  z-index:3;
  text-align:center;
  width:100%;
  max-width:680px;
  padding-bottom:140px;
}

/* logo */
.page-logo{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(20px,3vw,28px);
  letter-spacing:.06em;
  color:rgba(255,255,255,0.4);
  margin-bottom:28px;
}

/* check */
.check-icon{margin-bottom:20px}
.check-icon svg{width:64px;height:64px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes drawCircle{to{stroke-dashoffset:0}}
@keyframes drawCheck{to{stroke-dashoffset:0}}

/* heading */
.page-title{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(34px,6vw,56px);
  line-height:1.1;
  letter-spacing:.02em;
  margin-bottom:14px;
}

/* sub */
.page-sub{
  font-size:clamp(13px,1.8vw,16px);
  color:rgba(255,255,255,0.5);
  line-height:1.8;
  max-width:480px;
  margin:0 auto 24px;
}
.page-sub strong{color:#fff}

/* warning tag */
.warning-tag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color:rgba(255,255,255,0.42);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:30px;
  padding:8px 18px;
  margin-bottom:28px;
  white-space:nowrap;
}

/* video label */
.video-label{
  font-size:11px;
  font-weight:600;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  margin-bottom:12px;
}

/* video container */
.video-wrap{
  width:100%;
  max-width:640px;
  margin:0 auto 28px;
  border-radius:12px;
  overflow:hidden;
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.07);
}
.video-wrap wistia-player{
  display:block;
  width:100%;
}

/* back button */
.btn-home{
  display:inline-block;
  border:1.5px solid rgba(255,255,255,.45);
  background:transparent;
  color:#fff;
  font-size:14px;
  font-weight:400;
  letter-spacing:.03em;
  padding:13px 40px;
  border-radius:50px;
  text-decoration:none;
  transition:background .2s;
}
.btn-home:hover{background:rgba(255,255,255,.08)}

/* ══════════════════════════════
   MOBILE
══════════════════════════════ */
@media(max-width:640px){
  .page{padding:36px 16px 0}

  /* hide stars on very small screens — they eat space */
  .star-canvas{
    width:100px;height:100px;
    max-width:100px;
    top:8%;
    opacity:0.6;
  }
  #star-left{left:-14px}
  #star-right{right:-14px}

  .page-logo{font-size:18px;margin-bottom:20px}
  .check-icon svg{width:52px;height:52px}
  .page-title{font-size:32px;margin-bottom:12px}
  .page-sub{font-size:13px;margin-bottom:20px;padding:0 4px}

  .warning-tag{
    font-size:11px;
    padding:7px 14px;
    margin-bottom:22px;
    white-space:normal;
    text-align:left;
  }

  .video-label{margin-bottom:10px}
  .video-wrap{border-radius:10px;margin-bottom:22px}

  .btn-home{font-size:13px;padding:12px 32px}

  .content{padding-bottom:120px}

  #wave-canvas{height:220px}
}

@media(max-width:380px){
  .star-canvas{display:none} /* hide on very tiny screens */
}
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<section class="page">
  <canvas id="star-left"  class="star-canvas"></canvas>
  <canvas id="star-right" class="star-canvas"></canvas>
  <canvas id="wave-canvas"></canvas>

  <div class="content">

    <div class="page-logo">CLM-Market</div>

    <div class="check-icon">
      <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="34" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
        <circle cx="36" cy="36" r="34" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"
          stroke-dasharray="213" stroke-dashoffset="213"
          style="animation:drawCircle .7s ease forwards .2s"/>
        <path d="M22 37 L32 47 L50 28" stroke="#fff" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="40" stroke-dashoffset="40"
          style="animation:drawCheck .4s ease forwards .8s"/>
      </svg>
    </div>

    <h1 class="page-title">Application Received</h1>

    <p class="page-sub">
      We've got your info. Our team will review your application and if you're a fit for 1-1 Ecommerce coaching — <strong>you'll receive a phone call.</strong>
    </p>

    <div class="warning-tag">
      <span>📞</span> Keep your phone on — we call approved applicants directly
    </div>

    <p class="video-label">Watch this while you wait</p>

    <div class="video-wrap">
      <wistia-player media-id="9y97ovrv0l" aspect="1.7777777777777777"></wistia-player>
    </div>

    <a href="/" class="btn-home">← Back to Homepage</a>

  </div>
</section>

<script>
/* ══ STARS ══ */
(function(){
  [['star-left',1],['star-right',-1]].forEach(function(pair){
    var id=pair[0],dir=pair[1];
    var cv=document.getElementById(id);
    if(!cv)return;
    var dpr=window.devicePixelRatio||1;
    var S=280;
    cv.width=cv.height=S*dpr;
    cv.style.width=cv.style.height=S+'px';
    var ctx=cv.getContext('2d');
    ctx.scale(dpr,dpr);
    var cx=S/2,cy=S/2;
    var t=Math.random()*Math.PI*2;
    var layers=[
      {r:106,ir:40,rotOff:0,   speed:1.0},
      {r:78, ir:30,rotOff:0.52,speed:1.18},
      {r:52, ir:20,rotOff:1.08,speed:0.82}
    ];
    function drawFlexStar(r,ir,rot,wobble,ox,oy){
      ox=ox||0;oy=oy||0;
      ctx.beginPath();
      var pts=8;
      for(var i=0;i<pts;i++){
        var isO=i%2===0;
        var jig=isO?wobble*0.10*Math.sin(t*5.5+i*2.1):wobble*0.055*Math.sin(t*6.8+i*1.7);
        var flex=isO?1+jig+0.03*Math.sin(t*1.1+i*0.8):1+jig+0.02*Math.sin(t*0.9+i*1.1);
        var rad=(isO?r:ir)*flex;
        var th=(i/pts)*Math.PI*2+rot;
        var x=cx+ox+Math.cos(th)*rad,y=cy+oy+Math.sin(th)*rad;
        if(i===0){ctx.moveTo(x,y)}else{
          var pv=i-1;
          var pjig=(pv%2===0)?wobble*0.10*Math.sin(t*5.5+pv*2.1):wobble*0.055*Math.sin(t*6.8+pv*1.7);
          var pfl=(pv%2===0)?1+pjig+0.03*Math.sin(t*1.1+pv*0.8):1+pjig+0.02*Math.sin(t*0.9+pv*1.1);
          var pr=((pv%2===0)?r:ir)*pfl;
          var pth=(pv/pts)*Math.PI*2+rot;
          var mth=(pth+th)*0.5;
          var bow=isO?ir*1.05:r*0.60;
          ctx.quadraticCurveTo(cx+ox+Math.cos(mth)*bow,cy+oy+Math.sin(mth)*bow,x,y);
        }
      }
      ctx.closePath();
    }
    function frame(){
      t+=0.010;
      var rot0=t*dir*0.0006;
      var fx=Math.sin(t*0.07)*6+Math.sin(t*0.04)*2.5;
      var fy=Math.cos(t*0.055)*3+Math.cos(t*0.035)*1.2;
      var wb=0.38+0.28*Math.sin(t*0.14);
      ctx.clearRect(0,0,S,S);
      ctx.save();ctx.filter='blur(2.8px)';
        ctx.save();ctx.filter='blur(22px)';
        drawFlexStar(layers[0].r*0.9,layers[0].ir*0.9,rot0+layers[0].rotOff,wb,fx,fy);
        ctx.fillStyle='rgba(190,205,255,0.14)';ctx.fill();ctx.restore();
        ctx.save();ctx.filter='blur(9px)';
        drawFlexStar(layers[0].r,layers[0].ir,rot0+layers[0].rotOff,wb,fx,fy);
        ctx.strokeStyle='rgba(215,225,255,0.26)';ctx.lineWidth=7;ctx.stroke();ctx.restore();
        layers.forEach(function(l,si){
          var rot=rot0*l.speed+l.rotOff;
          drawFlexStar(l.r,l.ir,rot,wb,fx,fy);
          var bg=ctx.createRadialGradient(cx+fx-l.r*0.22,cy+fy-l.r*0.22,1,cx+fx,cy+fy,l.r);
          bg.addColorStop(0,'rgba(48,50,66,0.97)');bg.addColorStop(0.5,'rgba(15,15,22,0.98)');bg.addColorStop(1,'rgba(4,4,9,0.97)');
          ctx.fillStyle=bg;ctx.fill();
          ctx.save();ctx.filter='blur(6px)';
          drawFlexStar(l.r,l.ir,rot,wb,fx,fy);
          ctx.strokeStyle='rgba(185,198,255,'+(0.48-si*0.1)+')';ctx.lineWidth=4.5;ctx.stroke();ctx.restore();
          ctx.save();ctx.filter='blur(1.2px)';
          drawFlexStar(l.r,l.ir,rot,wb,fx,fy);
          ctx.strokeStyle='rgba(225,232,255,'+(0.55-si*0.12)+')';ctx.lineWidth=1.2;ctx.stroke();ctx.restore();
          ctx.save();drawFlexStar(l.r,l.ir,rot,wb,fx,fy);ctx.clip();
          var sa=rot*0.4+t*0.018;
          var sg=ctx.createLinearGradient(cx+fx+Math.cos(sa)*(-l.r*0.72),cy+fy+Math.sin(sa)*(-l.r*0.72),cx+fx+Math.cos(sa)*(l.r*0.42),cy+fy+Math.sin(sa)*(l.r*0.42));
          sg.addColorStop(0,'rgba(255,255,255,'+(0.52-si*0.11)+')');sg.addColorStop(0.22,'rgba(255,255,255,'+(0.2-si*0.05)+')');sg.addColorStop(0.55,'rgba(255,255,255,0.03)');sg.addColorStop(1,'rgba(255,255,255,0)');
          ctx.fillStyle=sg;ctx.fill();ctx.restore();
          ctx.save();ctx.filter='blur(3px)';
          drawFlexStar(l.r+3,l.ir+1.5,rot+0.014,wb*0.55,fx-1.2,fy);ctx.strokeStyle='rgba(75,145,255,'+(0.2-si*0.04)+')';ctx.lineWidth=1.8;ctx.stroke();
          drawFlexStar(l.r+3,l.ir+1.5,rot-0.014,wb*0.55,fx+1.2,fy);ctx.strokeStyle='rgba(255,75,115,'+(0.16-si*0.03)+')';ctx.lineWidth=1.8;ctx.stroke();ctx.restore();
          drawFlexStar(l.ir*1.1,l.ir*0.42,rot+Math.PI/4,wb*0.45,fx,fy);ctx.fillStyle='rgba(0,0,2,0.62)';ctx.fill();
        });
      ctx.restore();
      requestAnimationFrame(frame);
    }
    frame();
  });
})();

/* ══ PARTICLES ══ */
(function(){
  var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),W,H,pts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function init(){pts=[];for(var i=0;i<70;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*0.3+0.06;pts.push({x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,len:Math.random()*12+3,alpha:Math.random()*0.35+0.05,angle:a});}}
  function draw(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(p.len,0);ctx.strokeStyle='rgba(255,255,255,'+p.alpha+')';ctx.lineWidth=0.9;ctx.stroke();ctx.restore();p.x+=p.vx;p.y+=p.vy;if(p.x>W+20)p.x=-20;if(p.x<-20)p.x=W+20;if(p.y>H+20)p.y=-20;if(p.y<-20)p.y=H+20;});requestAnimationFrame(draw);}
  resize();init();draw();window.addEventListener('resize',function(){resize();init();});
})();

/* ══ WAVES ══ */
(function(){
  var c=document.getElementById('wave-canvas'),ctx=c.getContext('2d'),t=0;
  function resize(){c.width=c.offsetWidth;c.height=c.offsetHeight;}
  function draw(){
    var W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
    for(var i=0;i<18;i++){
      var yB=H*0.12+(i/18)*H*0.82,amp=20+i*3.2,freq=0.0072+i*0.00025,ph=t*0.55+i*0.42,al=0.05+(i/18)*0.13;
      ctx.beginPath();
      for(var x=0;x<=W;x+=3){var y=yB+Math.sin(x*freq+ph)*amp+Math.sin(x*freq*1.65+ph*0.8)*(amp*0.38);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.strokeStyle='rgba(255,255,255,'+al+')';ctx.lineWidth=1.4;ctx.stroke();
    }
    t+=0.011;requestAnimationFrame(draw);
  }
  resize();draw();window.addEventListener('resize',resize);
})();
</script>
</body>
</html>
